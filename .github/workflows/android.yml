name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle :app:assembleBazaarDebug :app:assembleMyketDebug

      - name: Configure release signing
        if: ${{ github.event_name == 'push' && env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BAZAAR_IAB_PUBLIC_KEY: ${{ secrets.BAZAAR_IAB_PUBLIC_KEY }}
          MYKET_IAB_PUBLIC_KEY: ${{ secrets.MYKET_IAB_PUBLIC_KEY }}
          HAMDEL_SERVER_BASE_URL: ${{ secrets.HAMDEL_SERVER_BASE_URL }}
          HAMDEL_SERVER_API_KEY: ${{ secrets.HAMDEL_SERVER_API_KEY }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/hamdel-release.jks"
          cat > release-signing.properties <<EOF
          RELEASE_STORE_FILE=$RUNNER_TEMP/hamdel-release.jks
          RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          RELEASE_KEY_ALIAS=$KEY_ALIAS
          RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          EOF
          cat > billing.properties <<EOF
          BAZAAR_IAB_PUBLIC_KEY=$BAZAAR_IAB_PUBLIC_KEY
          MYKET_IAB_PUBLIC_KEY=$MYKET_IAB_PUBLIC_KEY
          EOF
          cat > server.properties <<EOF
          HAMDEL_SERVER_BASE_URL=$HAMDEL_SERVER_BASE_URL
          HAMDEL_SERVER_API_KEY=$HAMDEL_SERVER_API_KEY
          EOF

      - name: Build signed release APK
        if: ${{ github.event_name == 'push' && env.HAS_RELEASE_SIGNING == 'true' }}
        run: gradle :app:assembleBazaarRelease :app:assembleMyketRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: hamdel-debug-apk
          path: app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: error

      - name: Upload signed release APK
        if: ${{ github.event_name == 'push' && env.HAS_RELEASE_SIGNING == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: hamdel-release-apk
          path: app/build/outputs/apk/*/release/*.apk
          if-no-files-found: error
